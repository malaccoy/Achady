<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ACHADY | Automação Inteligente</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              display: ['Poppins', 'sans-serif'],
            },
            colors: {
              brand: {
                50: '#f2f0ff',
                100: '#e6e1ff',
                200: '#d0c4ff',
                300: '#a38fff',
                400: '#8b5cf6',
                500: '#7A53FF', // ACHADY Neon Purple
                600: '#6236e6',
                700: '#4c1d95',
                800: '#2D3EFF', // ACHADY Royal Blue (mapped as dark brand for gradients)
              },
              achady: {
                purple: '#7A53FF',
                blue: '#2D3EFF',
                success: '#00C46A',
                error: '#FF4E4E',
                warning: '#FFB020',
                text: '#1A1A1A',
                bg: '#F5F6FA',
                gray: '#D9DCE3'
              }
            }
          },
        },
      }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Inter', sans-serif;
        background-color: #F5F6FA;
        color: #1A1A1A;
      }
      h1, h2, h3, h4, h5, h6, .font-display {
        font-family: 'Poppins', sans-serif;
      }
      /* Smooth scrolling */
      html {
        scroll-behavior: smooth;
      }
    </style>
<script type="importmap">
{
  "imports": {
    "react": "https://aistudiocdn.com/react@^19.2.1",
    "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.1/",
    "react/": "https://aistudiocdn.com/react@^19.2.1/",
    "react-router-dom": "https://aistudiocdn.com/react-router-dom@^7.10.0",
    "lucide-react": "https://aistudiocdn.com/lucide-react@^0.555.0",
    "vite": "https://aistudiocdn.com/vite@^7.2.6",
    "@vitejs/plugin-react": "https://aistudiocdn.com/@vitejs/plugin-react@^5.1.1",
    "@vercel/node": "https://aistudiocdn.com/@vercel/node@^5.5.14",
    "crypto": "https://aistudiocdn.com/crypto@^1.0.1"
  }
}
</script>
</head>
  <body>
    <div id="root"></div>

    <!-- BOTÃO DE CONEXÃO DO WHATSAPP -->
    <button id="btnConnectWhatsApp" 
    style="
    position: fixed;
    bottom: 20px;
    right: 20px;
    z-index: 10000;
    background:#25D366;
    color:white;
    padding:12px 18px;
    border-radius:8px;
    border:none;
    cursor:pointer;
    font-size:16px;
    font-weight:600;
    margin-top:20px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    ">
    📲 Conectar WhatsApp
    </button>

    <!-- MODAL DO QR -->
    <div id="qrModal" style="
        display:none;
        position:fixed;
        top:0; left:0; right:0; bottom:0;
        background-color:rgba(0,0,0,0.55);
        justify-content:center;
        align-items:center;
        z-index:99999;
    ">
        <div style="
            background:white;
            padding:20px;
            border-radius:10px;
            text-align:center;
            width:320px;
            box-shadow:0 0 20px rgba(0,0,0,0.4);
        ">
            <h2 style="margin-bottom:10px;">Conectar WhatsApp</h2>
            <p id="statusText">Gerando QR...</p>

            <img id="qrImage" width="260" style="margin-top:10px;" />

            <button onclick="document.getElementById('qrModal').style.display='none'" style="
                margin-top:15px;
                padding:10px 18px;
                border-radius:6px;
                border:none;
                cursor:pointer;
                background: #f0f0f0;
            ">
                Fechar
            </button>
        </div>
    </div>

    <!-- SCRIPT DE CONEXÃO -->
    <script type="module">
        import { iniciarConexaoWhatsApp } from "./connect-whatsapp.js";

        document.getElementById("btnConnectWhatsApp").onclick = () => {
            document.getElementById("qrModal").style.display = "flex";
            iniciarConexaoWhatsApp();
        };
    </script>

    <script type="module" src="/index.tsx"></script>
  </body>
</html>
